services:
  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
      - "8081:8081"
    volumes:
      - ./data:/data
      - ./server/web/dist:/app/web/dist:ro
    environment:
      - PREVIEWD_SERVER_HOST=${SERVER_HOST:-localhost}
      - PREVIEWD_TUNNEL_PORT=8080
      - PREVIEWD_DASHBOARD_PORT=8081
      - PREVIEWD_DB_PATH=/data/previewd.db
      - PREVIEWD_ADMIN_TOKEN=${ADMIN_TOKEN:-changeme}
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8081/api/tunnels"]
      interval: 10s
      timeout: 5s
      retries: 3

volumes: {}
